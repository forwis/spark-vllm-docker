# Recipe: Mistral-Medium-3.5-128B-NVFP4
# Mistral-Small-4-119B-2603 model with NVFP4 quantization support

recipe_version: "1"
name: Mistral-Medium-3.5-128B-NVFP4
description: vLLM serving Mistral-Medium-3.5-128B-NVFP4

# HuggingFace model to download (optional, for --download-model)
model: RecViking/Mistral-Medium-3.5-128B-NVFP4

cluster_only: false
solo_only: false

# Container image to use
container: vllm-node-tf5

# Keep filesystem caches moving during the large checkpoint load.
mods:
  - mods/drop-caches

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.88
  max_model_len: 200000
  max_num_batched_tokens: 8192
  mm_prompt_config: '{"image":4}'

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  TZ: Asia/Seoul

# The vLLM serve command template
# see: https://huggingface.co/mistralai/Mistral-Medium-3.5-128B-NVFP4#serve-the-model
command: |
  vllm serve RecViking/Mistral-Medium-3.5-128B-NVFP4 \
    --served-model-name mistral-medium-3.5-128b \
    --port {port} \
    --host {host} \
    --tensor-parallel-size {tensor_parallel} \
    --max-model-len {max_model_len} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --distributed-executor-backend ray \
    --max_num_seqs 4 \
    --kv-cache-dtype fp8 \
    --limit-mm-per-prompt {mm_prompt_config} \
    --enable-auto-tool-choice \
    --tool-call-parser mistral

#    --tokenizer-mode mistral \
#    --enable-auto-tool-choice \
#    --tool-call-parser mistral \
#    --reasoning-parser mistral
#    --language-model-only \
#    --limit-mm-per-prompt '{"image":4}'