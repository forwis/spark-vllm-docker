# Recipe: Qwen/Qwen3.5-35B-A3B-NVFP4
# Qwen/Qwen3.5-35B-A3B model in native NVFP4 format


recipe_version: "1"
name: Qwen36-35B-A3B
description: vLLM serving Qwen3.6-35B-A3B-NVFP4

# HuggingFace model to download (optional, for --download-model)
model: unsloth/Qwen3.6-35B-A3B-NVFP4

#solo_only: true

# Container image to use
container: vllm-node-tf5

mods:
  - mods/fix-qwen3.6-chat-template

# Default settings (can be overridden via CLI)
defaults:
  port: 54352
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.16
  max_model_len: 262144
  max_num_batched_tokens: 16384

# Environment variables
env: 
  VLLM_MARLIN_USE_ATOMIC_ADD: 1
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  TZ: Asia/Seoul
  HF_HUB_OFFLINE: 1

# The vLLM serve command template
command: |
  vllm serve unsloth/Qwen3.6-35B-A3B-NVFP4 \
    --host {host} \
    --port {port} \
    --max-model-len {max_model_len} \
    --max-num-batched-tokens {max_num_batched_tokens} \
    --gpu-memory-utilization {gpu_memory_utilization} \
    --enable-auto-tool-choice \
    --tool-call-parser qwen3_xml \
    --kv-cache-dtype fp8 \
    --load-format fastsafetensors \
    --attention-backend flashinfer \
    --enable-prefix-caching \
    --chat-template fixed_chat_template.jinja \
    -tp {tensor_parallel} \
    --distributed-executor-backend ray
