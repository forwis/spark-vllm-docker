# Recipe: DeepSeek-V4-Flash
# DeepSeek V4 Flash with vLLM PR 40991 applied.
# Recommended launch on two Spark nodes: ./run-recipe.sh deepseek-v4-flash --no-ray

recipe_version: "1"
name: DeepSeek-V4-Flash
description: vLLM serving deepseek-ai/DeepSeek-V4-Flash with DeepSeek V4 parser support

# HuggingFace model to download (optional, for --download-model)
model: deepseek-ai/DeepSeek-V4-Flash

# Requires multiple Spark nodes for tensor parallelism.
cluster_only: true

# Container image to use
container: vllm-node-tf5

# vLLM PR 40991 adds DeepSeek V4 model, tokenizer, reasoning, and tool parser support.
build_args:
  - --apply-vllm-pr
  - "40991"

# Keep filesystem caches moving during the large checkpoint load.
mods:
  - mods/drop-caches

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.70
  max_model_len: 200000
  max_num_batched_tokens: 4176
  max_num_seqs: 2
  block_size: 256
  served_model_name: deepseek-v4-flash
  load_format: instanttensor
  compilation_config: '{"cudagraph_mode":"FULL_AND_PIECEWISE","custom_ops":["all"]}'

# Environment variables
env:
  TILELANG_CLEANUP_TEMP_FILES: 1
  VLLM_TRITON_MLA_SPARSE: 1
  VLLM_TRITON_MLA_SPARSE_HEAD_BLOCK_SIZE: 4
  VLLM_ENGINE_READY_TIMEOUT_S: 3600
  VLLM_RPC_TIMEOUT: 600000
  VLLM_LOG_STATS_INTERVAL: 1

# The vLLM serve command template.
# In --no-ray mode, run-recipe/launch-cluster strips the Ray executor flag and
# launch-cluster appends per-node --nnodes/--node-rank/--master-* arguments.
command: |
  vllm serve deepseek-ai/DeepSeek-V4-Flash \
      --trust-remote-code \
      --kv-cache-dtype fp8 \
      --block-size {block_size} \
      --enable-prefix-caching \
      --tokenizer-mode deepseek_v4 \
      --tool-call-parser deepseek_v4 \
      --enable-auto-tool-choice \
      --reasoning-parser deepseek_v4 \
      --load-format {load_format} \
      --compilation-config '{compilation_config}' \
      --served-model-name {served_model_name} \
      --max-model-len {max_model_len} \
      --max-num-batched-tokens {max_num_batched_tokens} \
      --max-num-seqs {max_num_seqs} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      --host {host} \
      --port {port} \
      --no-disable-uvicorn-access-log \
      --distributed-executor-backend ray \
      -tp {tensor_parallel}