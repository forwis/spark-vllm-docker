# Recipe: Mimo-V2.5-NVFP4
# MiniMax M2.5 model with AWQ quantization

recipe_version: "1"
name: Mimo-V2.5-NVFP4
description: vLLM serving Mimo-V2.5-NVFP4 with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: lukealonso/MiMo-V2.5-NVFP4

# Container image to use
container: vllm-node-tf5

# Can only be run in a cluster
cluster_only: true

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.95

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  TZ: Asia/Seoul

# The vLLM serve command template
command: |
  vllm serve lukealonso/MiMo-V2.5-NVFP4 \
      --served-model-name mimo-v2.5 \
      --trust-remote-code \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --distributed-executor-backend ray \
      --kv-cache-dtype fp8  \
      --generation-config vllm \
      --enable-auto-tool-choice \
      --tool-call-parser mimo \
      --reasoning-parser mimo
