# Recipe: MiniMax-M2.7-NVFP4
# MiniMax M2.5 model with AWQ quantization

recipe_version: "1"
name: MiniMax-M2.7-NVFP4
description: vLLM serving MiniMax-M2.7-NVFP4 with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: lukealonso/MiniMax-M2.7-NVFP4

# Container image to use
container: vllm-node

# Can only be run in a cluster
cluster_only: true

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.9
  max_model_len: 262144

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  VLLM_NVFP4_GEMM_BACKEND: flashinfer-cutlass
  VLLM_USE_FLASHINFER_MOE_FP4: 1
  VLLM_ALLOW_LONG_MAX_MODEL_LEN: 1
  VLLM_FLOAT32_MATMUL_PRECISION: high
  VLLM_MEMORY_PROFILER_ESTIMATE_CUDAGRAPHS: 1
  VLLM_FLASHINFER_MOE_BACKEND: throughput
  OMP_NUM_THREADS: 8

# The vLLM serve command template
command: |
  vllm serve lukealonso/MiniMax-M2.7-NVFP4 \
      --served-model-name MiniMax-M2.7 \
      --trust-remote-code \
      --kv-cache-dtype fp8 \
      --dtype auto \
      --quantization modelopt_fp4 \
      --attention-backend flashinfer \
      --max-num-batched-tokens 8192 \
      --mamba_ssm_cache_dtype float32 \
      --disable-custom-all-reduce \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --max-num-seqs {max_num_seqs} \
      --distributed-executor-backend ray \
      --max-model-len {max_model_len} \
      --load-format fastsafetensors \
      --enable-auto-tool-choice \
      --tool-call-parser minimax_m2 \
      --reasoning-parser minimax_m2_append_think
