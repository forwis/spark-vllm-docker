# Recipe: MiniMax-M2.7-NVFP4
# MiniMax M2.7 model with NVFP4 quantization

recipe_version: "1"
name: MiniMax-M2.7-NVFP4
description: vLLM serving MiniMax-M2.7-NVFP4 with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: nvidia/MiniMax-M2.7-NVFP4

# Container image to use
container: vllm-node-tf5

# Can only be run in a cluster
cluster_only: true

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.8
  max_model_len: 196608

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  TZ: Asia/Seoul

# The vLLM serve command template
command: |
  vllm serve nvidia/MiniMax-M2.7-NVFP4 \
      --served-model-name minimax-m2.7-nvfp4 \
      --trust-remote-code \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --distributed-executor-backend ray \
      --max-model-len {max_model_len} \
      --load-format fastsafetensors \
      --enable-auto-tool-choice \
      --tool-call-parser minimax_m2 \
      --reasoning-parser minimax_m2 \
      --kv-cache-dtype fp8
