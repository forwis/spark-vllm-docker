# Recipe: MiniMax-M2.5-AWQ
# MiniMax M2.5 model with AWQ quantization

recipe_version: "1"
name: MiniMax-M2.5-AWQ
description: vLLM serving MiniMax-M2.5-AWQ with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: cyankiwi/MiniMax-M2.7-AWQ-4bit

# Container image to use
container: vllm-node

# Can only be run in a cluster
cluster_only: true

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.8
  max_model_len: 196608

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}

# The vLLM serve command template
command: |
  vllm serve cyankiwi/MiniMax-M2.7-AWQ-4bit \
      --served-model-name MiniMax-M2.7 \
      --trust-remote-code \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --max-model-len {max_model_len} \
      --max-num-seqs 4 \
      --max-num-batched-tokens 8192 \
      --enable-prefix-caching \
      --enable-chunked-prefill \
      --enable-auto-tool-choice \
      --tool-call-parser minimax_m2 \
      --reasoning-parser minimax_m2_append_think \
      --attention-backend flashinfer \
      --override-generation-config "{\"top_k\": 40, \"top_p\": 0.95, \"temperature\": 1.0, \"min_p\": 0.01}" \
      --dtype auto \
      --kv-cache-dtype fp8 \
      --disable-custom-all-reduce \
      --trust-remote-code \
      --load-format fastsafetensors \
      --distributed-executor-backend ray