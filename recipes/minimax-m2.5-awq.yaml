# Recipe: MiniMax-M2.5-AWQ
# MiniMax M2.5 model with AWQ quantization

recipe_version: "1"
name: MiniMax-M2.5-AWQ
description: vLLM serving MiniMax-M2.5-AWQ with Ray distributed backend

# HuggingFace model to download (optional, for --download-model)
model: QuantTrio/MiniMax-M2.5-AWQ

# Container image to use
container: vllm-node

# Can only be run in a cluster
cluster_only: true

# No mods required
mods: []

# Default settings (can be overridden via CLI)
defaults:
  port: 54351
  host: 0.0.0.0
  tensor_parallel: 2
  gpu_memory_utilization: 0.9
  VLLM_USE_DEEP_GEMM: 0
  VLLM_USE_FLASHINFER_MOE_FP16: 0
  VLLM_USE_FLASHINFER_SAMPLER: 0
  OMP_NUM_THREADS: 4
  compilation_config: '{"mode":3,"pass_config":{"fuse_minimax_qk_norm":true}}'

# Environment variables
env:
  HF_HOME: ${HF_HOME}
  HF_TOKEN: ${HF_TOKEN}
  TZ: Asia/Seoul

# The vLLM serve command template
command: |
  vllm serve QuantTrio/MiniMax-M2.5-AWQ \
      --served-model-name minimax-m2.5 \
      --trust-remote-code \
      --port {port} \
      --host {host} \
      --gpu-memory-utilization {gpu_memory_utilization} \
      -tp {tensor_parallel} \
      --distributed-executor-backend ray \
      --load-format fastsafetensors \
      --enable-auto-tool-choice \
      --tool-call-parser minimax_m2 \
      --reasoning-parser minimax_m2 \
      --kv-cache-dtype fp8 \
      --compilation-config '{compilation_config}'
      
